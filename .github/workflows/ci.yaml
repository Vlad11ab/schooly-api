name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: chmod +x mvnw && ./mvnw -B test
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=${{ github.event.repository.name }}-$(date +%y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            vlad11ab/schooly-api:latest
            vlad11ab/schooly-api:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  update-deploy-repo:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: Vlad11ab/schooly-docker-files
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: deploy

      - name: Update image tag in compose
        working-directory: deploy
        run: |
          sed -i "s|image: vlad11ab/schooly-api:.*|image: vlad11ab/schooly-api:${{ needs.build-and-push.outputs.tag }}|" docker-compose.yaml

      - name: Commit and push
        working-directory: deploy
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add docker-compose.yaml
          git diff --staged --quiet || git commit -m "deploy: schooly-api ${{ needs.build-and-push.outputs.tag }}"
          git push

